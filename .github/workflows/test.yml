name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tools/ -v

      - name: Run consistency checks
        run: python tools/check_workflow_consistency.py

      - name: spec-lint dogfood
        run: |
          set -euo pipefail
          python tools/spec_lint.py spec/spec_final.md
          python tools/spec_lint.py spec/spec-lint/spec_final.md
          python tools/spec_lint.py spec/gpt-researcher/spec_final.md
          python tools/spec_lint.py --format json spec/spec-lint/spec_final.md | python -c 'import json,sys;json.load(sys.stdin)'

      - name: dist smoke
        run: |
          set -euo pipefail
          test -f dist/spec-driven-dev/SKILL.md
          python dist/spec-driven-dev/scripts/scorecard_parser.py --help
          python dist/spec-driven-dev/scripts/spec_lint.py --help
          python dist/spec-driven-dev/scripts/check_consistency.py --help
          # MANIFEST integrity
          cd dist/spec-driven-dev
          EXPECTED=$(grep -v '^#' MANIFEST)
          ACTUAL=$(find . -type f -not -name MANIFEST -not -path './.omc/*' | LC_ALL=C sort | xargs shasum -a 256)
          test "$EXPECTED" = "$ACTUAL"
